# Infraestructura local para Demo Generator AI
# Levanta: PostgreSQL + MinIO (almacenamiento compatible S3)
# Uso: docker compose up -d
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: demogen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demogen
    ports:
      - "5432:5432"
    volumes:
      - demogen-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demogen"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Almacenamiento S3-compatible (opcional; STORAGE_DRIVER=s3)
  minio:
    image: minio/minio:latest
    container_name: demogen-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - demogen-miniodata:/data

  # Crea el bucket por defecto al arrancar
  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'esperando minio...' && sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/demogen;
      /usr/bin/mc anonymous set download local/demogen;
      exit 0;
      "

volumes:
  demogen-pgdata:
  demogen-miniodata:
